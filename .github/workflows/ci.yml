name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

# Run JS actions on Node 24 (checkout/setup-node/pnpm-setup still ship Node 20 majors).
# Silences the Node 20 deprecation warning ahead of the forced switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # changeset status compares against the base branch
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build first: typecheck needs the generated token sources (packages/tokens/src/_generated.ts,
      # which is gitignored) plus the built @eidra/tokens/@eidra/icons declarations react consumes.
      - run: pnpm build
      - run: pnpm typecheck
      # Fail the PR if it changes a package without a changeset describing the bump.
      - run: pnpm changeset status --since=origin/main

  # Render every story in a real (headless Chromium) browser via the Storybook
  # Vitest addon. Catches runtime render/serializer throws and a11y violations
  # that typecheck + build cannot see, plus runs each story's `play` function.
  storybook-test:
    runs-on: ubuntu-latest
    # checks: write lets the Publish step post the test report as a check run
    # (visible in the PR's Checks tab). Job-level perms replace the top-level
    # block, so contents: read is repeated here.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Stories consume the built @eidra/tokens dist + generated token sources.
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test-storybook
      # Publish a persistent pass/fail summary from junit.xml on every run (green
      # or red): a "Storybook tests" check run (Checks tab) + a table on this job's
      # summary page. always() so it reports even when the test step above failed;
      # fail_on_failure:false because that step already sets the job status. The
      # vitest github-actions reporter still owns the inline per-failure annotations.
      - name: Publish test report
        if: ${{ !cancelled() }}
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: junit.xml
          check_name: Storybook tests
          detailed_summary: true
          fail_on_failure: false
