name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

# Run JS actions on Node 24 (checkout/setup-node/pnpm-setup still ship Node 20 majors).
# Silences the Node 20 deprecation warning ahead of the forced switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # changeset status compares against the base branch
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build first: typecheck needs the generated token sources (packages/tokens/src/_generated.ts,
      # which is gitignored) plus the built @eidra/tokens/@eidra/icons declarations react consumes.
      - run: pnpm build
      - run: pnpm typecheck
      # Fail the PR if it changes a package without a changeset describing the bump.
      - run: pnpm changeset status --since=origin/main
