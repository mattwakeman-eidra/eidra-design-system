name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

# Run JS actions on Node 24 (checkout/setup-node/pnpm-setup still ship Node 20 majors).
# Silences the Node 20 deprecation warning ahead of the forced switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # Fast, build-free gate: ESLint (not type-aware — tsc owns types), Stylelint
  # on the CSS Modules, and a Prettier formatting check. Runs in parallel with
  # the build/test jobs below.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # changeset status compares against the base branch
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build first: typecheck needs the generated token sources (packages/tokens/src/_generated.ts,
      # which is gitignored) plus the built @eidra/tokens/@eidra/icons declarations react consumes.
      - run: pnpm build
      - run: pnpm typecheck
      # Fail the PR if a committed *generated* artifact is stale (a component
      # changed but `pnpm catalog` wasn't re-run + committed). Only the agent
      # catalog + component index are committed generated files; the token build
      # output (packages/tokens/build/, packages/tokens/dist/) is gitignored and
      # rebuilt from the DTCG JSON on every build, so there's nothing to diff.
      - run: pnpm catalog
      - name: Generated artifacts are up to date
        run: git diff --exit-code docs/COMPONENTS.md packages/react/llms.txt
      # Fail the PR if it changes a package without a changeset describing the bump.
      - run: pnpm changeset status --since=origin/main

  # Render every story in a real (headless Chromium) browser via the Storybook
  # Vitest addon. Catches runtime render/serializer throws and a11y violations
  # that typecheck + build cannot see, plus runs each story's `play` function.
  storybook-test:
    runs-on: ubuntu-latest
    # checks: write lets the Publish step post the test report as a check run
    # (visible in the PR's Checks tab). Job-level perms replace the top-level
    # block, so contents: read is repeated here.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Stories consume the built @eidra/tokens dist + generated token sources.
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test-storybook
      # Publish a persistent pass/fail summary from junit.xml on every run (green
      # or red): a "Storybook tests" check run (Checks tab). always() so it reports
      # even when the test step above failed; fail_on_failure:false because that step
      # already sets the job status. The vitest github-actions reporter still owns the
      # inline per-failure annotations.
      #
      # We render the job-summary page ourselves (next step) instead of letting the
      # action attach it, so the big passed-test table can live inside a collapsed
      # <details>. The action has no input to collapse it, but it exposes the compact
      # and detailed tables as HTML outputs (summary / detailed_summary) we can place
      # by hand. include_passed + detailed_summary make detailed_summary include the
      # passed rows; job_summary:false stops the action writing its own (uncollapsed)
      # summary.
      - name: Publish test report
        id: junit
        if: ${{ !cancelled() }}
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: junit.xml
          check_name: Storybook test report
          include_passed: true
          detailed_summary: true
          job_summary: false
          fail_on_failure: false
      # Compact pass/fail table always visible; the (large) per-test table — passed
      # tests included — only when the reader expands the disclosure. GitHub renders
      # raw HTML, incl. <details>, in $GITHUB_STEP_SUMMARY.
      - name: Job summary with collapsible passed tests
        if: ${{ !cancelled() }}
        env:
          SUMMARY: ${{ steps.junit.outputs.summary }}
          DETAILED_SUMMARY: ${{ steps.junit.outputs.detailed_summary }}
        run: |
          {
            echo "### Storybook tests"
            echo "$SUMMARY"
            echo "<details><summary>Per-test results (incl. passed)</summary>"
            echo ""
            echo "$DETAILED_SUMMARY"
            echo ""
            echo "</details>"
          } >>"$GITHUB_STEP_SUMMARY"
